<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Documents juridiques de Crible+ — politique de confidentialité, conditions d'utilisation et mentions légales.">
    <title>Documents juridiques — Crible+ | Francis Manseau</title>
    <link rel="icon" href="../../../assets/brand/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="../../../assets/brand/favicon/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="../../../assets/brand/favicon/favicon-16.png" type="image/png" sizes="16x16">
    <link rel="shortcut icon" href="../../../assets/logo/favicon.png" type="image/png">
    <script src="../../../js/theme.js"></script>
    <link rel="stylesheet" href="../../../css/site.css?v=8">
    <link rel="stylesheet" href="../../../css/themes.css?v=8">
    <link rel="stylesheet" href="../../../css/layout.css?v=8">
    <link rel="stylesheet" href="../../../css/interactive.css?v=8">
    <link rel="stylesheet" href="../../../css/mobile-readability.css?v=8">
    <link rel="stylesheet" href="../../../css/legal.css?v=11">
    <style>
        .legal-bundle-page main {
            max-width: min(760px, 100%);
            margin: 0 auto;
            padding: clamp(24px, 5vw, 48px) clamp(16px, 4vw, 24px) clamp(48px, 8vw, 72px);
        }

        .legal-bundle-intro {
            text-align: center;
            margin-bottom: clamp(28px, 5vw, 40px);
        }

        .legal-bundle-intro p {
            margin: 0;
            color: var(--text-muted-soft);
            font-size: clamp(0.92rem, 2.2vw, 1rem);
            line-height: 1.65;
        }

        .legal-bundle-updated {
            margin: clamp(10px, 2vw, 14px) 0 0;
            color: var(--text-muted-soft);
            font-size: clamp(0.82rem, 2vw, 0.9rem);
            line-height: 1.55;
            font-weight: 400;
        }

        .legal-bundle-page .legal-accordion {
            margin-bottom: clamp(28px, 5vw, 40px);
        }

        .legal-bundle-sections {
            display: grid;
            gap: clamp(18px, 3vw, 24px);
            margin-top: clamp(18px, 3vw, 24px);
        }

        .legal-bundle-section {
            scroll-margin-top: calc(var(--header-h) + 16px);
            padding: clamp(14px, 2.5vw, 18px) 0 0;
            border-top: 1px solid var(--border);
        }

        .legal-bundle-section:first-child {
            border-top: none;
            padding-top: 0;
        }

        .legal-bundle-section h3 {
            margin: 0 0 12px;
            font-size: clamp(1rem, 2.6vw, 1.12rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
        }

        .legal-bundle-section .legal-accordion-body {
            padding: 0;
        }

        .legal-bundle-status {
            text-align: center;
            color: var(--text-muted-soft);
            padding: 24px 0;
        }

        .legal-bundle-status.is-error {
            color: #f87171;
        }

        .legal-back-top-wrap {
            display: none;
            text-align: center;
            margin-top: clamp(8px, 2vw, 16px);
            padding-bottom: 8px;
        }

        .legal-back-top-wrap .site-back-top-btn {
            cursor: pointer;
        }

        a.legal-toc-link {
            text-decoration: none;
        }

        @media (min-width: 641px) {
            .legal-back-top-wrap {
                display: block;
            }

            body[data-nav-active="legal"] .site-back-top {
                display: none;
            }
        }
    </style>
</head>
<body class="legal-bundle-page" data-nav-root="../../../" data-nav-active="legal">
    <script src="../../../js/site-bg.js"></script>

    <header class="site-header">
        <div class="header-top">
            <div class="header-brand">
                <a href="../../../index.html" class="logo-link">
                    <img src="../../../assets/logo/logo-nav.png" alt="" class="logo-icon" width="56" height="56">
                    <span class="logo-text">Francis <span>Manseau</span></span>
                </a>
            </div>
            <nav class="main-nav" id="mainNav" aria-label="Navigation principale"></nav>
            <script src="../../../js/site-nav.js?v=6"></script>
            <span class="lang-status" id="langStatus" data-translate>Traduction…</span>
            <nav class="lang-switcher" id="langFlags" aria-label="Choisir la langue">
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn active" data-lang="fr">FR</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="de">DE</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="es">ES</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="it">IT</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="zh-CN">ZH</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="ja">JA</button>
                <span class="lang-sep" aria-hidden="true">|</span>
                <button type="button" class="lang-btn" data-lang="pt">PT</button>
            </nav>
            <script src="../../../js/lang-ui.js"></script>
            <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">?</button>
        </div>
    </header>

    <main>
        <header class="legal-header legal-bundle-intro">
            <h1 class="legal-header-product">Crible+</h1>
            <p>Documents juridiques — Francis Manseau</p>
            <p class="legal-bundle-updated" id="legalBundleUpdated">Dernière mise à jour : 26 juin 2026</p>
        </header>

        <p class="legal-bundle-status" id="legalBundleStatus">Chargement des documents…</p>
        <div class="legal-accordion" id="legalDocuments" hidden aria-label="Documents juridiques Crible+"></div>

        <p class="legal-back-top-wrap">
            <button type="button" class="site-back-top-btn" id="legalBackTopInline" aria-label="Remonter en haut">? Haut</button>
        </p>
    </main>

    
    <script src="../../../js/nav.js"></script>
    <script src="../../../js/mobile-nav.js"></script>
    <script src="../../../js/portrait-lock.js"></script>
    <script src="../../../js/back-to-top.js"></script>
    <script src="../../../js/i18n.js"></script>
    <script>
        (function () {
            var DOCUMENTS = [
                { id: "privacy", path: "privacy/fr.json" },
                { id: "terms", path: "terms/fr.json" },
                { id: "legal-notice", path: "legal-notice/fr.json" }
            ];

            var CHEVRON =
                '<svg class="legal-accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">' +
                    '<path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>' +
                "</svg>";

            var statusEl = document.getElementById("legalBundleStatus");
            var containerEl = document.getElementById("legalDocuments");
            var inlineTopBtn = document.getElementById("legalBackTopInline");

            function escapeHtml(text) {
                return String(text)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            function isDataAvailable(data) {
                return data
                    && data.available !== false
                    && Array.isArray(data.sections)
                    && data.sections.length > 0;
            }

            function prefersReducedMotion() {
                return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            }

            function openAccordionItem(item, button) {
                if (!item || !button) return;
                containerEl.querySelectorAll(".legal-accordion-item.is-open").forEach(function (openItem) {
                    if (openItem === item) return;
                    openItem.classList.remove("is-open");
                    var openBtn = openItem.querySelector(".legal-accordion-trigger");
                    if (openBtn) openBtn.setAttribute("aria-expanded", "false");
                });
                item.classList.add("is-open");
                button.setAttribute("aria-expanded", "true");
            }

            function toggleAccordionItem(item, button) {
                if (!item || !button) return;
                if (item.classList.contains("is-open")) {
                    item.classList.remove("is-open");
                    button.setAttribute("aria-expanded", "false");
                } else {
                    openAccordionItem(item, button);
                }
            }

            function resolveDocIdFromHash(hash) {
                if (!hash) return "";
                if (hash === "legal-notice" || hash.indexOf("legal-notice") === 0) return "legal-notice";
                if (hash === "terms" || hash.indexOf("terms") === 0) return "terms";
                if (hash === "privacy" || hash.indexOf("privacy") === 0) return "privacy";
                return "";
            }

            function openDocById(docId, scroll) {
                if (!docId) return;
                var item = document.getElementById(docId);
                var button = document.getElementById("legal-trigger-" + docId);
                if (!item || !button) return;

                openAccordionItem(item, button);

                if (!scroll) return;
                window.requestAnimationFrame(function () {
                    item.scrollIntoView({
                        behavior: prefersReducedMotion() ? "auto" : "smooth",
                        block: "start"
                    });
                    button.focus({ preventScroll: true });
                });
            }

            function renderDocument(data) {
                var docId = data.documentType;
                var panelId = "legal-panel-" + docId;
                var triggerId = "legal-trigger-" + docId;

                var tocItems = data.sections.map(function (section) {
                    return (
                        "<li>" +
                            '<a class="legal-toc-link" href="#' + escapeHtml(docId + "-" + section.id) + '">' +
                                escapeHtml(section.title) +
                            "</a>" +
                        "</li>"
                    );
                }).join("");

                var sectionsHtml = data.sections.map(function (section) {
                    return (
                        '<section class="legal-bundle-section" id="' + escapeHtml(docId + "-" + section.id) + '">' +
                            "<h3>" + escapeHtml(section.title) + "</h3>" +
                            '<div class="legal-accordion-body">' + section.body + "</div>" +
                        "</section>"
                    );
                }).join("");

                return (
                    '<article class="legal-accordion-item" id="' + escapeHtml(docId) + '">' +
                        '<h2 class="legal-accordion-heading">' +
                            '<button type="button" class="legal-accordion-trigger" id="' + triggerId + '" aria-expanded="false" aria-controls="' + panelId + '">' +
                                "<span>" + escapeHtml(data.documentTitle) + "</span>" +
                                CHEVRON +
                            "</button>" +
                        "</h2>" +
                        '<div class="legal-accordion-panel" id="' + panelId + '" role="region" aria-labelledby="' + triggerId + '">' +
                            '<div class="legal-accordion-panel-inner">' +
                                '<div class="legal-accordion-body">' +
                                    '<nav class="legal-toc" aria-label="Sommaire — ' + escapeHtml(data.documentTitle) + '">' +
                                        '<p class="legal-toc-title">Sommaire</p>' +
                                        '<ul class="legal-toc-list">' + tocItems + "</ul>" +
                                    "</nav>" +
                                    '<div class="legal-bundle-sections">' + sectionsHtml + "</div>" +
                                "</div>" +
                            "</div>" +
                        "</div>" +
                    "</article>"
                );
            }

            function bindAccordion() {
                containerEl.querySelectorAll(".legal-accordion-trigger").forEach(function (button) {
                    button.addEventListener("click", function () {
                        var item = button.closest(".legal-accordion-item");
                        toggleAccordionItem(item, button);
                        if (item && item.id && history.replaceState) {
                            history.replaceState(null, "", "#" + item.id);
                        }
                    });
                });

                containerEl.querySelectorAll("a.legal-toc-link").forEach(function (link) {
                    link.addEventListener("click", function (event) {
                        var href = link.getAttribute("href") || "";
                        var hash = href.replace(/^#/, "");
                        var docId = resolveDocIdFromHash(hash);
                        if (!docId) return;
                        event.preventDefault();
                        if (history.replaceState) {
                            history.replaceState(null, "", "#" + hash);
                        } else {
                            location.hash = hash;
                        }
                        openDocById(docId, false);
                        var target = document.getElementById(hash);
                        if (target) {
                            window.requestAnimationFrame(function () {
                                target.scrollIntoView({
                                    behavior: prefersReducedMotion() ? "auto" : "smooth",
                                    block: "start"
                                });
                            });
                        }
                    });
                });
            }

            async function loadDocuments() {
                var rendered = [];

                for (var i = 0; i < DOCUMENTS.length; i++) {
                    var doc = DOCUMENTS[i];
                    var response = await fetch(doc.path);

                    if (!response.ok) {
                        throw new Error("missing:" + doc.path);
                    }

                    var data = await response.json();

                    if (!isDataAvailable(data)) {
                        throw new Error("pending:" + doc.path);
                    }

                    rendered.push(renderDocument(data));
                }

                containerEl.innerHTML = rendered.join("");
                statusEl.hidden = true;
                containerEl.hidden = false;
                bindAccordion();

                var initialDoc = resolveDocIdFromHash((location.hash || "").replace(/^#/, ""));
                if (initialDoc) {
                    openDocById(initialDoc, true);
                }
            }

            if (inlineTopBtn) {
                inlineTopBtn.addEventListener("click", function () {
                    window.scrollTo({
                        top: 0,
                        behavior: prefersReducedMotion() ? "auto" : "smooth"
                    });
                });
            }

            window.addEventListener("hashchange", function () {
                var docId = resolveDocIdFromHash((location.hash || "").replace(/^#/, ""));
                if (docId) openDocById(docId, true);
            });

            loadDocuments().catch(function () {
                statusEl.textContent = "Contenu juridique temporairement indisponible.";
                statusEl.classList.add("is-error");
            });
        })();
    </script>
</body>
</html>
